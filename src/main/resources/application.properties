spring.application.name=JsWater

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/jswater}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Bony@2025}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


security.jwt.secret=${JWT_SECRET:change-me-please-use-a-long-random-secret-key}
security.jwt.expiration=86400000


logging.level.org.springframework.security=DEBUG

