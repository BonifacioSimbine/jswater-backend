spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
  security:
    jwt:
      secret: ${JWT_SECRET}
logging:
  level:
    org.springframework.security: INFO
server:
  port: 8081

# CORS: configure o domínio do frontend de produção em SecurityConfig.java
# Exemplo: configuration.setAllowedOrigins(List.of("https://meusite.com"));
