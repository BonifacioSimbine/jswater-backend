spring:
  datasource:
    url: jdbc:postgresql://prod-db-server:5432/jswater_prod
    username: prod_user
    password: prod_pass
  jpa:
    show-sql: false
logging:
  level:
    org.springframework.security: INFO
server:
  port: 8081

# CORS: configure o domínio do frontend de produção em SecurityConfig.java
# Exemplo: configuration.setAllowedOrigins(List.of("https://meusite.com"));

# expose legacy property key expected by JwtService (set real secret via env in production)
security:
  jwt:
    secret: prod-secret-placeholder
