spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: true
  security:
    jwt:
      secret: ${JWT_SECRET}
logging:
  level:
    org.springframework.security: DEBUG
server:
  port: 8080


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

